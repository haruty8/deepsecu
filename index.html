<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="naver-site-verification" content="3c5bd4193cb7968bf94887206303c40dadd91c03" />
<meta name="description" content="딥시큐(DeepSecu)는 공공기관 통합 IT 인프라 구축 자문, PMO, 공공데이터 및 정보보안·개인정보보호 종합 컨설팅 전문 기업입니다.">
<title>딥시큐 DeepSecu | IT 인프라 구축 자문 · PMO · 공공데이터 컨설팅</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="icon" href="/favicon.ico" type="image/x-icon">
<style>
:root {
  --bg-light: #ffffff;
  --bg-gray: #f5f8fc;      
  --bg-banner: linear-gradient(135deg, #e4effb 0%, #f0f6fd 50%, #f7faff 100%);
  
  --text-main: #0a1128;    
  --text-muted: #2d3748;   
  --text-light: #4a5568;   
  
  --accent: #1e6fcf;       
  --bright: #1b7cf2;       
  --cyan: #008cb8;         
  
  --card-bg: rgba(255, 255, 255, 0.85);
  --border: #cbd5e1;       
  --shadow: rgba(10, 17, 40, 0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body {
  background: var(--bg-light);
  color: var(--text-main);
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
  letter-spacing: -0.02em;
  line-height: 1.65;
  overflow-x: hidden;
  padding-bottom: 0; /* 모바일 퀵메뉴 패딩은 미디어쿼리에서 처리 */
}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;}

/* 🗺️ NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 60px;height:72px;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(14px);
  border-bottom:2px solid var(--border);
  transition:background .3s;
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;position:relative;z-index:210;}
.nav-logo svg{width:32px;height:32px;}
.nav-logo span{font-family:'Plus Jakarta Sans', sans-serif;font-size:1.55rem;font-weight:800;color:var(--text-main);letter-spacing:-0.5px;}
.nav-logo span em{color:var(--accent);font-style:normal;}

/* GNB */
.gnb{display:flex;list-style:none;gap:4px;margin-left:40px;}
.gnb > li{position:relative;}
.gnb > li > a{
  display:flex;align-items:center;gap:4px;
  height:72px;padding:0 22px;
  color:var(--text-muted);font-size:1.05rem;
  font-weight:700;
  text-decoration:none;transition:color .2s;
  border-bottom:3px solid transparent;
}
.gnb > li > a:hover,.gnb > li > a.active{color:var(--accent);border-bottom-color:var(--accent);}

/* 드롭다운 */
.dropdown{
  position:absolute;top:72px;left:0;
  min-width:230px;
  background:rgba(255,255,255,.98);
  border:1px solid var(--border);
  border-top:3px solid var(--accent);
  border-radius:0 0 8px 8px;
  padding:10px 0;
  opacity:0;visibility:hidden;
  transform:translateY(-6px);
  transition:all .2s;
  backdrop-filter:blur(12px);
  box-shadow:0 12px 30px rgba(11, 19, 43, 0.15);
}
.gnb > li:hover .dropdown{opacity:1;visibility:visible;transform:translateY(0);}
.dropdown a{
  display:block;padding:12px 24px;
  color:var(--text-muted);font-size:0.98rem;
  font-weight:600;
  text-decoration:none;transition:all .2s;
  border-left:3px solid transparent;
}
.dropdown a:hover{color:var(--accent);background:rgba(30,111,207,.08);border-left-color:var(--accent);}

.nav-right{display:flex;align-items:center;gap:20px;}
.nav-tel{font-size:0.95rem;color:var(--text-muted);letter-spacing:0;font-weight:600;}
.nav-tel span{color:var(--accent);font-weight:800;}
.nav-cta{
  background:linear-gradient(135deg,var(--accent),var(--bright));
  color:#fff;padding:10px 24px;border-radius:6px;
  font-size:0.95rem;font-weight:700;text-decoration:none;
  transition:all .3s;box-shadow:0 4px 14px rgba(30,111,207,.3);
}
.nav-cta:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(30,111,207,.45);}

/* 📱 모바일 메뉴 토글 버튼 (기본 숨김) */
.m-menu-btn {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  position: relative;
  z-index: 210;
}
.m-menu-btn span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--text-main);
  margin: 5px 0;
  transition: all 0.3s;
}
/* 모바일 메뉴 열렸을 때 애니메이션 */
.m-menu-btn.open span:nth-child(1) { transform: rotate(-45deg) translate(-5px, 5px); }
.m-menu-btn.open span:nth-child(2) { opacity: 0; }
.m-menu-btn.open span:nth-child(3) { transform: rotate(45deg) translate(-5px, -5px); }

/* 📱 모바일 하단 고정 퀵 메뉴 (기본 숨김) */
.m-sticky-bar {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  z-index: 190;
  grid-template-columns: 1fr 1.2fr;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
}
.m-sticky-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-decoration: none;
  font-size: 0.95rem;
  font-weight: 700;
}
.m-sticky-btn.tel { color: var(--text-main); background: #ffffff; }
.m-sticky-btn.cta { color: #ffffff; background: linear-gradient(135deg, var(--accent), var(--bright)); }

/* 📄 PAGE SYSTEM */
.page{display:none;min-height:100vh;padding-top:72px;}
.page.active{display:block;}

.page-banner{
  position:relative;z-index:1;
  padding:90px 60px 70px;
  background: var(--bg-banner);
  border-bottom:1px solid var(--border);
  overflow:hidden;
}
.page-banner::before{
  content:'';position:absolute;inset:0;
  background-image: linear-gradient(rgba(30,111,207,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(30,111,207,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(circle at 80% 50%, black, transparent 75%);
  -webkit-mask-image: radial-gradient(circle at 80% 50%, black, transparent 75%);
}
.page-banner::after{
  content:'';position:absolute;top:-20%;right:-5%;
  width:450px;height:450px;
  background:radial-gradient(circle,rgba(30,111,207,.15) 0%,transparent 70%);
  border-radius:50%;
}
.page-banner .breadcrumb{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size:0.85rem;color:var(--text-light);letter-spacing:0.5px;
  margin-bottom:14px;font-weight:700;position:relative;z-index:2;
}
.page-banner .breadcrumb span{color:var(--accent);}
.page-banner h1{
  font-size:clamp(2.4rem,4.5vw,3.5rem);font-weight:800;
  color:var(--text-main);letter-spacing:-0.04em;margin-bottom:16px;position:relative;z-index:2;
}
.page-banner p{color:var(--text-muted);font-size:1.1rem;font-weight:500;line-height:1.6;position:relative;z-index:2;}

/* 🏢 COMMON SECTION */
.sec{position:relative;z-index:1;padding:100px 60px;}
.sec-label{font-family:'Plus Jakarta Sans', sans-serif;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;font-weight:700;}
.sec-title{font-size:clamp(2.1rem,3.5vw,2.8rem);font-weight:800;color:var(--text-main);margin-bottom:20px;letter-spacing:-0.04em;line-height:1.3;}
.sec-desc{color:var(--text-muted);font-size:1.05rem;line-height:1.8;max-width:680px;font-weight:500;}
.inner{max-width:1200px;margin:0 auto;}

.btn-p{background:linear-gradient(135deg,var(--accent),var(--bright));color:#fff;padding:15px 36px;border-radius:6px;text-decoration:none;font-weight:700;font-size:1.02rem;transition:all .3s;box-shadow:0 4px 20px rgba(30,111,207,.3);border:none;cursor:pointer;display:inline-block;}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(30,111,207,.45);}
.btn-o{border:2px solid var(--accent);color:var(--accent);padding:15px 36px;border-radius:6px;text-decoration:none;font-weight:700;font-size:1.02rem;transition:all .3s;display:inline-block;background:#ffffff;}
.btn-o:hover{background:rgba(30,111,207,.08);border-color:var(--bright);color:var(--bright);}

.card {
  background:var(--card-bg);
  backdrop-filter: blur(10px);
  border:1px solid rgba(203, 213, 225, 0.7);
  border-radius:14px;padding:40px 36px;
  box-shadow:0 6px 20px var(--shadow);
  transition:all .35s;
}
.card:hover{border-color:var(--bright);transform:translateY(-6px);box-shadow:0 18px 40px rgba(30,111,207,.15);}

/* 🏠 HOME PAGE */
#page-home .hero{
  position:relative;z-index:1;
  min-height:calc(100vh - 72px);
  display:flex;align-items:center;
  padding:90px 60px;overflow:hidden;
  background: radial-gradient(circle at 80% 20%, #eaf3fc 0%, #f4f8fd 40%, #ffffff 80%);
}
.hero-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(30,111,207,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(30,111,207,.06) 1px,transparent 1px);
  background-size:55px 55px;
  mask-image: linear-gradient(to bottom, black, transparent);
  -webkit-mask-image: linear-gradient(to bottom, black, transparent);
  animation:gridScroll 22s linear infinite;
}
@keyframes gridScroll{from{background-position:0 0}to{background-position:55px 55px}}
.hero-glow{position:absolute;top:10%;right:5%;width:550px;height:550px;background:radial-gradient(circle,rgba(30,111,207,.16) 0%,transparent 70%);border-radius:50%;animation:glowPulse 5s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:0.9}}

.hero-content{position:relative;max-width:820px;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(30,111,207,.08);border:1px solid rgba(30,111,207,.25);padding:6px 18px;border-radius:20px;font-size:0.8rem;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:28px;font-weight:700;animation:fadeUp .7s ease both;}
.hero-badge::before{content:'';width:6px;height:6px;background:var(--bright);border-radius:50%;animation:blink 1.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

.hero-title{
  font-size:clamp(2.2rem, 4.2vw, 3.2rem); 
  font-weight:800;
  line-height:1.3;
  color:var(--text-main);letter-spacing:-0.04em;margin-bottom:24px;animation:fadeUp .7s .1s ease both;
}
.hero-title .hl{color:var(--accent);}
.hero-sub{font-size:1.25rem;color:var(--text-muted);line-height:1.8;margin-bottom:44px;font-weight:500;animation:fadeUp .7s .2s ease both;}
.hero-btns{display:flex;gap:16px;animation:fadeUp .7s .3s ease both;}

.hero-stats{
  position:absolute;right:60px;bottom:60px;
  display:flex;gap:40px;
  animation:fadeUp .7s .4s ease both;
}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;color:var(--accent);line-height:1;letter-spacing:1px;}
.stat-label{font-size:0.85rem;color:var(--text-light);margin-top:4px;font-weight:700;}

.home-services{
  background:var(--bg-gray);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.home-services::before {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(#1e6fcf 0.5px, transparent 0.5px);
  background-size: 24px 24px; opacity: 0.25;
  mask-image: linear-gradient(to right, transparent, black 50%, transparent);
  -webkit-mask-image: linear-gradient(to right, transparent, black 50%, transparent);
}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:50px;}
.svc-card{position:relative;overflow:hidden;}
.svc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--bright));transform:scaleX(0);transform-origin:left;transition:transform .4s;}
.svc-card:hover::before{transform:scaleX(1);}
.svc-num{font-family:'Bebas Neue',sans-serif;font-size:3.8rem;color:rgba(30,111,207,.08);position:absolute;top:12px;right:18px;line-height:1;}
.svc-icon{width:52px;height:52px;background:rgba(30,111,207,.08);border:1px solid rgba(30,111,207,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:20px;}
.svc-title{font-size:1.3rem;font-weight:700;color:var(--text-main);margin-bottom:12px;}
.svc-desc{font-size:0.98rem;color:var(--text-muted);line-height:1.7;margin-bottom:20px;font-weight:500;}
.svc-tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{background:rgba(30,111,207,.06);border:1px solid rgba(30,111,207,.2);color:var(--accent);font-size:0.8rem;padding:4px 12px;border-radius:4px;font-weight:700;}
.svc-more{display:inline-flex;align-items:center;gap:5px;color:var(--accent);font-size:0.92rem;font-weight:700;cursor:pointer;margin-top:20px;border:none;background:none;transition:gap .2s;}
.svc-more:hover{gap:10px;}

.home-numbers{background:var(--bg-light); position: relative;}
.home-numbers::before {
  content: ''; position: absolute; top:0; left: 10%; width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(0, 200, 255, 0.05) 0%, transparent 70%);
}
.num-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:50px;position: relative; z-index: 2;}
.num-item{background:var(--card-bg);padding:42px 28px;text-align:center;}
.num-big{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:var(--accent);line-height:1;margin-bottom:8px;letter-spacing:1px;}
.num-label{font-size:0.95rem;color:var(--text-muted);line-height:1.6;font-weight:700;}

/* 🏢 COMPANY PAGE */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:70px;align-items:center;}
.about-feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:34px;}
.feat-card{background:var(--bg-gray);border:1px solid var(--border);border-radius:10px;padding:24px;transition:all .3s;}
.feat-card:hover{background:rgba(30,111,207,.04);border-color:var(--bright);}
.feat-icon{font-size:1.7rem;margin-bottom:10px;}
.feat-title{font-weight:700;font-size:1.05rem;margin-bottom:8px;color:var(--text-main);}
.feat-desc{font-size:0.88rem;color:var(--text-muted);line-height:1.6;font-weight:500;}

.timeline{position:relative;margin-top:50px;padding-left:30px;}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--bright),var(--accent),transparent);}
.tl-item{position:relative;padding:0 0 36px 30px;}
.tl-dot{position:absolute;left:-7px;top:4px;width:14px;height:14px;background:var(--bg-light);border:2px solid var(--accent);border-radius:50%;}
.tl-year{font-family:'Plus Jakarta Sans', sans-serif;font-size:1.25rem;font-weight:800;color:var(--accent);margin-bottom:8px;}
.tl-content{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:22px;box-shadow:0 4px 12px var(--shadow);}
.tl-content h4{font-size:1.1rem;font-weight:700;color:var(--text-main);margin-bottom:8px;}
.tl-content p{font-size:0.92rem;color:var(--text-muted);line-height:1.65;font-weight:500;}

/* 💼 BUSINESS PAGE */
.biz-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:50px;overflow-x:auto;}
.biz-tab{
  padding:16px 28px;font-size:1.02rem;font-weight:700;
  color:var(--text-light);border:none;background:none;cursor:pointer;
  border-bottom:3px solid transparent;white-space:nowrap;
  transition:all .2s;
}
.biz-tab.active,.biz-tab:hover{color:var(--accent);border-bottom-color:var(--accent);}
.biz-panel{display:none;}
.biz-panel.active{display:block;}

.biz-detail{display:grid;grid-template-columns:1fr 1.1fr;gap:60px;align-items:start;}
.biz-visual{
  background:var(--bg-gray);border:1px solid var(--border);
  border-radius:16px;padding:48px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:340px;text-align:center;
  background-image: radial-gradient(rgba(30,111,207,0.06) 1.5px, transparent 1.5px);
  background-size: 16px 16px;
}
.biz-visual .icon-big{font-size:4.5rem;margin-bottom:16px;}
.biz-visual h3{font-size:1.6rem;font-weight:800;color:var(--accent);letter-spacing:-0.03em;}

.biz-info h2{font-size:2rem;font-weight:800;color:var(--text-main);margin-bottom:20px;letter-spacing:-0.04em;}
.biz-info p{color:var(--text-muted);font-size:1.05rem;line-height:1.85;margin-bottom:24px;font-weight:500;}
.biz-list{list-style:none;display:flex;flex-direction:column;gap:14px;margin-bottom:28px;}
.biz-list li{display:flex;align-items:center;gap:12px;font-size:1.02rem;color:var(--text-main);font-weight:600;}
.biz-list li::before{content:'';width:7px;height:7px;background:var(--accent);border-radius:50%;flex-shrink:0;}
.process-steps{display:flex;flex-direction:column;gap:14px;margin-top:28px;}
.step{display:flex;align-items:center;gap:18px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:18px 22px;box-shadow:0 3px 8px var(--shadow);}
.step-n{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);line-height:1;min-width:32px;}
.step-info h5{font-size:1rem;font-weight:700;color:var(--text-main);margin-bottom:4px;}
.step-info p{font-size:0.88rem;color:var(--text-muted);font-weight:500;}

/* 📈 PERFORMANCE PAGE */
.perf-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:60px;}
.perf-stat{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:32px;text-align:center;box-shadow:0 4px 15px var(--shadow);}
.perf-stat .big{font-family:'Bebas Neue',sans-serif;font-size:3.4rem;color:var(--accent);line-height:1;letter-spacing:1px;}
.perf-stat .label{font-size:0.95rem;color:var(--text-muted);margin-top:6px;font-weight:700;}

.pf-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;}
.pf-btn{padding:10px 24px;border-radius:20px;border:1px solid var(--border);background:#ffffff;color:var(--text-muted);font-size:0.92rem;cursor:pointer;transition:all .2s;font-weight:700;}
.pf-btn.active,.pf-btn:hover{background:rgba(30,111,207,.1);border-color:var(--accent);color:var(--accent);}

.pf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.pf-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:28px;box-shadow:0 5px 15px var(--shadow);transition:all .3s;cursor:default;}
.pf-card:hover{border-color:var(--bright);background:rgba(30,111,207,.02);transform:translateY(-4px);}
.pf-year{font-family:'Plus Jakarta Sans', sans-serif;font-size:0.88rem;color:var(--accent);letter-spacing:1px;margin-bottom:10px;font-weight:800;}
.pf-name{font-size:1.05rem;font-weight:700;color:var(--text-main);margin-bottom:10px;line-height:1.45;}
.pf-desc{font-size:0.92rem;color:var(--text-muted);line-height:1.65;font-weight:500;}
.pf-badge{display:inline-block;background:rgba(30,111,207,.08);border:1px solid rgba(30,111,207,.2);color:var(--accent);font-size:0.78rem;padding:4px 12px;border-radius:4px;font-weight:700;margin-top:14px;}

.client-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:40px;}
.client-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:26px;text-align:center;box-shadow:0 5px 14px var(--shadow);transition:all .3s;}
.client-card:hover{border-color:var(--bright);transform:translateY(-3px);}
.client-ico{font-size:2.2rem;margin-bottom:10px;}
.client-name{font-size:0.95rem;font-weight:700;color:var(--text-main);margin-bottom:6px;}
.client-type{font-size:0.85rem;color:var(--text-light);font-weight:600;}

/* 📞 CONTACT PAGE */
.contact-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:60px;align-items:start;}
.contact-info-cards{display:flex;flex-direction:column;gap:16px;margin-top:34px;}
.ci-card{display:flex;align-items:flex-start;gap:16px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:22px;box-shadow:0 4px 14px var(--shadow);}
.ci-ico{width:46px;height:46px;background:rgba(30,111,207,.08);border:1px solid rgba(30,111,207,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.ci-label{font-size:0.8rem;color:var(--text-light);margin-bottom:4px;font-weight:700;}
.ci-val{font-size:1.02rem;color:var(--text-main);font-weight:700;}

.contact-form{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:42px;box-shadow:0 8px 30px var(--shadow);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fg{margin-bottom:18px;}
.fg label{display:block;font-size:0.88rem;color:var(--text-main);margin-bottom:8px;font-weight:700;}
.fg input,.fg textarea,.fg select{
  width:100%;background:#ffffff;
  border:2px solid #cbd5e1;border-radius:8px; 
  padding:13px 16px;color:var(--text-main);
  font-family:inherit;font-size:0.98rem;font-weight:500;
  transition:border-color .3s;outline:none;-webkit-appearance:none;
}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--accent);background:rgba(30,111,202,0.02);}
.fg textarea{height:115px;resize:vertical;}

.fg-privacy {
  margin-top: 20px;
  margin-bottom: 22px;
}
.privacy-box {
  background: var(--bg-gray);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  font-size: 0.85rem;
  color: var(--text-light);
  height: 80px;
  overflow-y: auto;
  line-height: 1.55;
  margin-bottom: 10px;
  font-weight: 500;
}
.privacy-check {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-main);
  cursor: pointer;
}
.privacy-check input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--accent);
}

.submit-btn{
  width:100%;background:linear-gradient(135deg,var(--accent),var(--bright));
  color:#fff;border:none;padding:15px;border-radius:8px;
  font-family:inherit;font-size:1.02rem;font-weight:700;
  cursor:pointer;transition:all .3s;
  box-shadow:0 4px 20px rgba(30,111,207,.3);
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(30,111,207,.45);}

.map-wrap{margin-top:50px;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 6px 20px var(--shadow);}
.map-wrap iframe{display:block;width:100%;height:380px;border:none;}
.map-info{
  background:var(--card-bg);
  padding:24px 32px;
  display:flex;flex-wrap:wrap;gap:24px;align-items:center;
  justify-content:space-between;
}
.map-info-item{display:flex;align-items:center;gap:10px;font-size:0.95rem;color:var(--text-muted);font-weight:600;}
.map-info-item .ico{font-size:1.2rem;}
.map-link{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--accent),var(--bright));
  color:#fff;padding:12px 24px;border-radius:6px;
  text-decoration:none;font-size:0.9rem;font-weight:700;
  transition:all .3s;
}
.map-link:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(30,111,207,.4);}

/* 📋 FOOTER */
footer{
  position:relative;z-index:1;
  background:#edf2f7;  
  border-top:2px solid var(--border);
  padding:0 60px;
}
.footer-top{
  display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;
  gap:50px;padding:60px 0 40px;
  border-bottom:1px solid var(--border);
}
.footer-brand .logo{display:flex;align-items:center;gap:8px;font-family:'Plus Jakarta Sans', sans-serif;font-size:1.45rem;font-weight:800;color:var(--text-main);margin-bottom:16px;}
.footer-brand p{font-size:0.95rem;color:var(--text-muted);line-height:1.75;font-weight:600;}
.footer-col h5{font-size:0.95rem;font-weight:700;color:var(--text-main);letter-spacing:0.5px;margin-bottom:18px;text-transform:uppercase;}
.footer-col a{display:block;font-size:0.92rem;color:var(--text-muted);text-decoration:none;margin-bottom:12px;transition:color .2s;font-weight:600;}
.footer-col a:hover{color:var(--accent);}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding:24px 0;}
.footer-copy{font-size:0.88rem;color:var(--text-light);font-weight:600;}
